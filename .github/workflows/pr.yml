name: Run Unit Tests on Pull Request

on:
  pull_request:
    branches:
      - "**"

jobs:
  run-npm-script-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18"

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm run test
